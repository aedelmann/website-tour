baseURL = 'https://silentwanderers.com'
languageCode = 'en-us'
title = 'Silent Wanderers'
canonifyURLs = false
publishDir = 'public'
enableRobotsTXT = true
# Include posts dated in the future (e.g. trip write-ups) in lists, RSS, and the map
buildFuture = true

[params]
  author = "Cristyne & Alex"
  site_description = "Follow our Tesla Model Y adventure around Europe and the world"
  copyright = "Cristyne & Alex"
  logo = "logo.png"
  title_in_logo = true
  disable_mathjax = true
  date_format = "02 January, 2006"
  
  # Contact info
  email = "contactus@silentwanderers.com"
  instagram = "silentwanderers_"
  tesla_model = "Tesla Model Y"
  
  # Map initial view (Europe, zoomed in)
  map_center_lat = 38
  map_center_lng = 12
  map_zoom = 6

  # SEO (optional)
  # twitter = "yourhandle"       # site-wide @handle for twitter:site (no @ in value)
  seo_locale = "en_US"
  seo_default_image = "/logo.png"   # fallback when a page has no featured_image

  # Theme colors - Warm editorial
  primary_color = "#b45309"
  secondary_color = "#4d7c5a"
  accent_color = "#0d9488"

[params.share]
  enable = true
  facebook = true
  twitter = true
  linkedin = true
  email = true

[params.privacy]
  enable = false
  facebook_like = false

[params.widgets]
  recent_articles = true
  categories = true
  tags = true
  tag_cloud = true
  archives = false
  search = true
  mailchimp = false
  author = true

[params.slider]
  enable = true
  manual = false
  num_features = 6

[social]
  rss = "Needed"
  instagram = "silentwanderers_"
  email = "contactus@silentwanderers.com"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Map"
    url = "/map/"
    weight = 3
  [[menu.main]]
    name = "Charge Stats"
    url = "/charging/"
    weight = 4
  [[menu.main]]
    name = "About Us"
    url = "/about/"
    weight = 5
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 6
[taxonomies]
  category = "categories"
  tag = "tags"
  location = "locations"

[permalinks]
  categories = "/categories/:slug/"
  tags = "/tags/:slug/"